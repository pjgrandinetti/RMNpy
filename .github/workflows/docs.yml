name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout RMNpy repository
      uses: actions/checkout@v4
      
    - name: Checkout workspace dependencies
      run: |
        # Clone the main workspace that contains all dependencies
        cd ..
        git clone https://github.com/pjgrandinetti/OCTypes-SITypes.git workspace
        cd workspace
        
        # Copy the current RMNpy version over the workspace version
        rm -rf RMNpy
        cp -r ../RMNpy .
        
        echo "Workspace structure:"
        ls -la
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/docs/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libcurl4-openssl-dev pkg-config cmake flex bison
        
    - name: Build workspace dependencies
      run: |
        cd ../workspace
        
        # Build OCTypes
        echo "Building OCTypes..."
        cd OCTypes
        make clean || true
        make
        make install
        echo "OCTypes built successfully"
        cd ..
        
        # Build SITypes
        echo "Building SITypes..."  
        cd SITypes
        make clean || true
        make
        make install
        echo "SITypes built successfully"
        cd ..
        
        # Build RMNLib
        echo "Building RMNLib..."
        cd RMNLib
        make clean || true
        make 
        make install
        echo "RMNLib built successfully"
        cd ..
        
    - name: Update RMNpy with built libraries
      run: |
        cd ../workspace/RMNpy
        
        # Update include directories
        rm -rf include
        mkdir -p include
        cp -r ../OCTypes/install/include/* include/ 2>/dev/null || true
        cp -r ../SITypes/install/include/* include/ 2>/dev/null || true
        cp -r ../RMNLib/install/include/* include/ 2>/dev/null || true
        
        # Update library directories
        rm -rf lib
        mkdir -p lib
        cp ../OCTypes/install/lib/*.a lib/ 2>/dev/null || true
        cp ../SITypes/install/lib/*.a lib/ 2>/dev/null || true
        cp ../RMNLib/install/lib/*.a lib/ 2>/dev/null || true
        
        echo "Updated libraries:"
        ls -la lib/
        
        # Copy back to original location
        cd ../../RMNpy
        cp -r ../workspace/RMNpy/include .
        cp -r ../workspace/RMNpy/lib .
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r docs/requirements.txt
        
    - name: Verify built libraries
      run: |
        echo "Checking for SIUnitFromExpression symbol..."
        nm lib/libSITypes.a | grep "SIUnitFromExpression" || echo "Symbol check complete"
        
    - name: Build RMNpy package
      run: |
        pip install -e .
        
    - name: Test RMNpy import
      run: |
        python -c "import rmnpy; print(f'RMNpy version: {rmnpy.__version__}')"
        
    - name: Build documentation
      run: |
        cd docs
        sphinx-build -b html . _build/html -W --keep-going
        
    - name: Upload documentation artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/_build/html

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
