name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout RMNpy repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/docs/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libcurl4-openssl-dev pkg-config cmake flex bison
        
    - name: Create stub libraries for CI
      run: |
        echo "Creating minimal stub libraries for CI build..."
        
        # Create comprehensive stub implementations for CI
        cat > stub_sitypes.c << 'EOF'
        #include <stdlib.h>
        #include <stdbool.h>
        
        // Minimal stub implementations for CI
        typedef void* SIUnitRef;
        typedef void* SIScalarRef;
        typedef void* SIDimensionRef;
        typedef void* SILinearDimensionRef;
        typedef void* SIMonotonicDimensionRef;
        typedef void* SIQuantityRef;
        typedef void* SIDimensionalityRef;
        typedef void* OCStringRef;
        typedef void* OCTypeRef;
        typedef void* OCArrayRef;
        typedef void* OCMutableArrayRef;
        typedef void* OCDictionaryRef;
        typedef void* OCMutableDictionaryRef;
        typedef void* OCNumberRef;
        typedef void* OCIndexArrayRef;
        typedef void* OCMutableIndexArrayRef;
        typedef void* DatasetRef;
        typedef void* DatumRef;
        typedef void* DimensionRef;
        typedef void* LabeledDimensionRef;
        typedef void* DependentVariableRef;
        typedef void* GeographicCoordinateRef;
        typedef void* SparseSamplingRef;
        typedef signed long OCIndex;
        typedef unsigned long OCOptionFlags;
        typedef unsigned int OCTypeID;
        typedef int bint;
        typedef enum { kDimensionScalingNone, kDimensionScalingNMR } dimensionScaling;
        
        // SITypes functions
        SIUnitRef SIUnitFromExpression(OCStringRef expression, double *unit_multiplier, OCStringRef *error) {
            if (unit_multiplier) *unit_multiplier = 1.0;
            if (error) *error = NULL;
            return NULL;
        }
        
        SIScalarRef SIScalarCreateWithDouble(double value, SIUnitRef unit) {
            return NULL;
        }
        
        double SIScalarDoubleValue(SIScalarRef scalar) {
            return 0.0;
        }
        
        SIUnitRef SIScalarGetUnit(SIScalarRef scalar) {
            return NULL;
        }
        
        OCStringRef SIScalarCreateStringValue(SIScalarRef scalar) {
            return NULL;
        }
        
        OCStringRef SIUnitCreateStringValue(SIUnitRef unit) {
            return NULL;
        }
        
        void SITypesShutdown(void) {
            // Do nothing in stub
        }
        
        // OCTypes functions
        void OCRelease(const void* obj) {
            // Do nothing in stub
        }
        
        void OCRetain(const void* obj) {
            // Do nothing in stub
        }
        
        OCStringRef OCStringCreate(const char* cString) {
            return NULL;
        }
        
        OCStringRef OCStringCreateWithCString(const char* cString) {
            return NULL;
        }
        
        OCStringRef OCStringCreateCopy(OCStringRef str) {
            return NULL;
        }
        
        const char* OCStringGetCString(OCStringRef string) {
            return "";
        }
        
        OCArrayRef OCArrayCreate(const void* const* values, OCIndex numValues, const void* callbacks) {
            return NULL;
        }
        
        OCIndex OCArrayGetCount(OCArrayRef array) {
            return 0;
        }
        
        const void* OCArrayGetValueAtIndex(OCArrayRef array, OCIndex idx) {
            return NULL;
        }
        
        OCMutableArrayRef OCArrayCreateMutable(OCIndex capacity, const void* callBacks) {
            return NULL;
        }
        
        void OCArrayAppendValue(OCMutableArrayRef array, const void* value) {
            // Do nothing in stub
        }
        
        OCNumberRef OCNumberCreateWithDouble(double value) {
            return NULL;
        }
        
        double OCNumberGetDoubleValue(OCNumberRef number) {
            return 0.0;
        }
        
        // Additional common OCTypes functions
        void OCAutoreleasePoolCreate(void) {
            // Do nothing in stub
        }
        
        void OCAutoreleasePoolDestroy(void) {
            // Do nothing in stub
        }
        
        // RMNLib functions
        DatasetRef DatasetCreate(OCArrayRef dimensions, 
                               OCIndexArrayRef dimensionPrecedence,
                               OCArrayRef dependentVariables,
                               OCArrayRef tags,
                               OCStringRef description, 
                               OCStringRef title,
                               DatumRef focus,
                               DatumRef previousFocus,
                               OCDictionaryRef metadata,
                               OCStringRef* outError) {
            if (outError) *outError = NULL;
            return NULL;
        }
        
        OCStringRef DatasetGetTitle(DatasetRef dataset) {
            return NULL;
        }
        
        OCStringRef DatasetGetDescription(DatasetRef dataset) {
            return NULL;
        }
        
        OCArrayRef DatasetGetDimensions(DatasetRef dataset) {
            return NULL;
        }
        
        OCArrayRef DatasetGetDependentVariables(DatasetRef dataset) {
            return NULL;
        }
        
        DatumRef DatumCreate(SIScalarRef response,
                            OCArrayRef coordinates, 
                            OCIndex dependentVariableIndex,
                            OCIndex componentIndex,
                            OCIndex memOffset) {
            return NULL;
        }
        
        SIScalarRef DatumCreateResponse(DatumRef datum) {
            return NULL;
        }
        
        SIScalarRef DatumGetCoordinateAtIndex(DatumRef datum, OCIndex index) {
            return NULL;
        }
        
        OCIndex DatumCoordinatesCount(DatumRef datum) {
            return 0;
        }
        
        OCIndex DatumGetComponentIndex(DatumRef datum) {
            return 0;
        }
        
        OCIndex DatumGetDependentVariableIndex(DatumRef datum) {
            return 0;
        }
        
        const char* DimensionGetLabel(DimensionRef dimension) {
            return "";
        }
        
        OCStringRef DimensionGetDescription(DimensionRef dim) {
            return NULL;
        }
        
        OCStringRef DimensionGetType(DimensionRef dim) {
            return NULL;
        }
        
        OCIndex DimensionGetCount(DimensionRef dim) {
            return 0;
        }
        
        LabeledDimensionRef LabeledDimensionCreateWithCoordinateLabels(OCArrayRef labels) {
            return NULL;
        }
        
        OCArrayRef LabeledDimensionGetCoordinateLabels(LabeledDimensionRef dim) {
            return NULL;
        }
        
        SILinearDimensionRef SILinearDimensionCreate(OCStringRef label,
                                                    OCStringRef description,
                                                    OCDictionaryRef metadata,
                                                    OCStringRef quantity,
                                                    SIScalarRef offset,
                                                    SIScalarRef origin,
                                                    SIScalarRef period,
                                                    bint periodic,
                                                    dimensionScaling scaling,
                                                    OCIndex count,
                                                    SIScalarRef increment,
                                                    bint fft,
                                                    SIDimensionRef reciprocal,
                                                    OCStringRef* outError) {
            if (outError) *outError = NULL;
            return NULL;
        }
        
        OCIndex SILinearDimensionGetCount(SILinearDimensionRef dim) {
            return 0;
        }
        
        SIScalarRef SILinearDimensionGetIncrement(SILinearDimensionRef dim) {
            return NULL;
        }
        
        OCDictionaryRef DimensionCopyAsDictionary(DimensionRef dim) {
            return NULL;
        }
        
        DimensionRef DimensionCreateFromDictionary(OCDictionaryRef dict, OCStringRef* outError) {
            if (outError) *outError = NULL;
            return NULL;
        }
        
        void RMNLibTypesShutdown(void) {
            // Do nothing in stub
        }
        EOF
        
        # Compile the stub and add it to the existing libraries
        gcc -c stub_sitypes.c -o stub_sitypes.o
        ar rcs lib/libSITypes.a stub_sitypes.o
        ar rcs lib/libOCTypes.a stub_sitypes.o
        ar rcs lib/libRMNLib.a stub_sitypes.o
        
        echo "Comprehensive stub libraries created"
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r docs/requirements.txt
        
    - name: Build RMNpy package
      run: |
        pip install -e .
        
    - name: Test RMNpy import
      run: |
        python -c "import rmnpy; print(f'RMNpy version: {rmnpy.__version__}')"
        
    - name: Build documentation
      run: |
        cd docs
        make html
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/_build/html

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v3
