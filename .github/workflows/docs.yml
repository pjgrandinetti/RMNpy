

name: Build Documentation

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed

permissions:
  contents: read


  docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout RMNpy repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/docs/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libcurl4-openssl-dev pkg-config cmake flex bison
    - name: Create stub libraries for CI
      run: |
        echo "Creating minimal stub libraries for CI build..."
        # Create comprehensive stub implementations for CI
        cat > stub_sitypes.c << 'EOF'
        #include <stdlib.h>
        #include <stdbool.h>
        // ...existing code...
        void RMNLibTypesShutdown(void) {
            // Do nothing in stub
        }
        EOF
        # Compile the stub and add it to the existing libraries
        gcc -c stub_sitypes.c -o stub_sitypes.o
        ar rcs lib/libSITypes.a stub_sitypes.o
        ar rcs lib/libOCTypes.a stub_sitypes.o
        ar rcs lib/libRMN.a stub_sitypes.o
        echo "Comprehensive stub libraries created"
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r docs/requirements.txt
    - name: Build RMNpy package
      run: |
        pip install -e .
    - name: Test RMNpy import
      run: |
        python -c "import rmnpy; print(f'RMNpy version: {rmnpy.__version__}')"
    - name: Build documentation
      run: |
        cd docs
        make html
    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/_build/html
        typedef void* DimensionRef;
