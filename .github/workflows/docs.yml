name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout RMNpy repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/docs/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libcurl4-openssl-dev pkg-config cmake flex bison
        
    - name: Create stub libraries for CI
      run: |
        echo "Creating minimal stub libraries for CI build..."
        
        # Create comprehensive stub implementations for CI
        cat > stub_sitypes.c << 'EOF'
        #include <stdlib.h>
        
        // Minimal stub implementations for CI
        typedef void* SIUnitRef;
        typedef void* OCStringRef;
        typedef void* OCTypeRef;
        
        // SITypes functions
        SIUnitRef SIUnitFromExpression(OCStringRef expression, double *unit_multiplier, OCStringRef *error) {
            if (unit_multiplier) *unit_multiplier = 1.0;
            if (error) *error = NULL;
            return NULL;
        }
        
        // OCTypes functions that might be needed
        void OCRelease(OCTypeRef obj) {
            // Do nothing in stub
        }
        
        void OCRetain(OCTypeRef obj) {
            // Do nothing in stub
        }
        
        OCStringRef OCStringCreate(const char* cString) {
            return NULL;
        }
        
        const char* OCStringGetCString(OCStringRef string) {
            return "";
        }
        
        // Additional common OCTypes functions
        void OCAutoreleasePoolCreate(void) {
            // Do nothing in stub
        }
        
        void OCAutoreleasePoolDestroy(void) {
            // Do nothing in stub
        }
        EOF
        
        # Compile the stub and add it to the existing libraries
        gcc -c stub_sitypes.c -o stub_sitypes.o
        ar rcs lib/libSITypes.a stub_sitypes.o
        ar rcs lib/libOCTypes.a stub_sitypes.o
        ar rcs lib/libRMNLib.a stub_sitypes.o
        
        echo "Comprehensive stub libraries created"
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r docs/requirements.txt
        
    - name: Build RMNpy package
      run: |
        pip install -e .
        
    - name: Test RMNpy import
      run: |
        python -c "import rmnpy; print(f'RMNpy version: {rmnpy.__version__}')"
        
    - name: Build documentation
      run: |
        cd docs
        make html
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/_build/html

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v3
